services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: shopnest
      POSTGRES_PASSWORD: shopnest
      POSTGRES_DB: shopnest_dev
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shopnest -d shopnest_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "13001:3001"
    environment:
      DATABASE_URL: postgresql://shopnest:shopnest@db:5432/shopnest_dev
      NODE_ENV: production
      PORT: "3001"
      WEB_URL: http://localhost:3000
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:?required}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?required}
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 30d
      REFRESH_GRACE_PERIOD_MS: "30000"
      CART_MAX_QTY_PER_PRODUCT: "10"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3001/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:3001
    ports:
      - "13000:3000"
    environment:
      NODE_ENV: production
      HOSTNAME: "0.0.0.0"
      WEB_URL: http://localhost:3000
      NEXT_PUBLIC_API_URL: http://localhost:3001
      INTERNAL_API_URL: http://api:3001
    depends_on:
      api:
        condition: service_healthy

volumes:
  pg_data:
